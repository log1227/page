<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Photography Reference</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <!-- Custom CSS for dropdown submenu, modal, and image styling -->
        <style>
            .dropdown-submenu {
                position: relative;
            }
            
            .dropdown-submenu .dropdown-menu {
                top: 0;
                left: 100%;
                margin-top: -1px;
                display: none;
            }
            
            .dropdown-submenu.show > .dropdown-menu {
                display: block;
            }
            
            /* Modal styling */
            .modal-dialog.modal-xl {
                max-width: 90vw;
                max-height: 90vh;
                margin: 5vh auto;
            }
            
            .modal-body {
                max-height: calc(90vh - 120px);
                overflow-y: auto;
            }
            
            /* Image container styling with shadow effect */
            .card {
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            }
            
            /* Image styling to fill container with black background */
            .card-img-top {
                width: 100%;
                height: 250px;
                object-fit: contain;
                background-color: #000;
                object-position: center;
            }
            
            /* Modal image styling */
            #modal-content img {
                max-width: 100%;
                height: auto;
                max-height: 70vh;
                object-fit: contain;
                background-color: #000;
                margin: 0 auto;
                display: block;
            }
            
            /* 修复子菜单显示问题 */
            .dropdown-submenu {
                position: relative;
            }
            
            .dropdown-submenu .dropdown-menu {
                top: 0;
                left: 100%;
                margin-top: -1px;
                display: none;
                position: absolute;
                z-index: 1000;
                min-width: 150px;
            }
            
            /* 当子菜单本身有show类时显示 */
            .dropdown-submenu .dropdown-menu.show {
                display: block;
            }
            
            /* 确保鼠标可以在主菜单和子菜单之间移动 */
            .dropdown-submenu:hover > .dropdown-menu {
                display: block;
            }
            
            /* 修复hover时的显示问题 */
            .dropdown-menu .dropdown-submenu:hover > .dropdown-menu {
                display: block;
            }
            
            /* Text container styling */
            .bg-light.rounded pre {
                margin: 0 auto;
                display: block;
                text-align: center;
                max-width: 100%;
                width: fit-content;
                background-color: #f8f9fa;
                padding: 1rem;
                border-radius: 0.375rem;
                white-space: pre-wrap;
                word-wrap: break-word;
            }
            
            /* Main category styling */
            .main-category-item {
                font-weight: bold;
                color: #212529;
                background-color: #f8f9fa;
                cursor: default;
                padding: 0.25rem 1rem;
            }
            
            /* Sub category styling with indentation */
            .sub-category-item {
                padding-left: 2rem;
                font-weight: normal;
            }
            
            /* Category container styling */
            .category-container {
                margin-bottom: 0.5rem;
            }
            
            /* Sub category always visible with indentation */
            .sub-category-item {
                display: block;
                position: static;
                border: none;
                box-shadow: none;
                padding-left: 2rem;
            }
        </style>
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container px-4 px-lg-5">
                <!-- 返回按钮 -->
                <a class="btn btn-outline-dark me-3" href="../index.html" style="display: flex; align-items: center; gap: 5px; color: #212529; border-color: #6c757d; transition: all 0.2s ease;">
                    <i class="bi bi-arrow-left"></i> 返回
                    <style>
                        /* 悬停效果 */
                        .btn-outline-dark:hover {
                            color: white !important;
                            background-color: #212529 !important;
                            border-color: #212529 !important;
                        }
                        .btn-outline-dark:hover i {
                            color: white !important;
                        }
                    </style>
                </a>
                <a class="navbar-brand" href="#!">素材参考</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">筛选</a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <!-- Dropdown menu will be dynamically generated by JavaScript -->
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Header-->
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">素材参考</h1>
                </div>
            </div>
        </header>
        <!-- Section-->
        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5">
                <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center" id="image-gallery">
                    <!-- Image cards will be dynamically generated by JavaScript -->
                </div>
            </div>
        </section>
        
        <!-- Image Modal -->
        <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="imageModalLabel">图片详情</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div id="modal-content">
                            <!-- Modal content will be dynamically generated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer-->
        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">素材参考</p></div>
        </footer>
        
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- File data script -->
        <script src="assets/js/fileData.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
    </body>
</html>
